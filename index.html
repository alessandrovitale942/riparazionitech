<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepairPro — Gestionale Professionale</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* --- VARIABILI E RESET --- */
:root {
  --red: #ff2200;
  --orange: #ff5500;
  --amber: #ff8800;
  --green: #00ff88;
  --bg: #000000;
  --s1: #0a0a0a;
  --s2: #111111;
  --s3: #1a1a1a;
  --border: #252525;
  --text: #ffffff; /* Testo Bianco per PC */
  --muted: #aaaaaa;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); 
  color: var(--text); 
  font-family: 'DM Sans', sans-serif; 
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* --- LAYOUT --- */
.app { display: flex; min-height: 100vh; }

.sidebar { 
  width: 220px; 
  background: var(--s1); 
  border-right: 1px solid var(--border); 
  position: fixed; 
  height: 100vh; 
  display: flex; 
  flex-direction: column; 
  z-index: 100; 
}

.logo-box { padding: 20px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 38px; height: 38px; background: linear-gradient(135deg, var(--red), var(--orange)); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.logo-name { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; color: var(--orange); }
.logo-name span { color: #fff; }

.nav { padding: 10px 8px; flex: 1; }
.nav-btn { 
  display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px; border: none; background: none; 
  color: var(--muted); font-size: 13px; border-radius: 8px; cursor: pointer; transition: 0.2s; margin-bottom: 2px;
}
.nav-btn:hover { background: var(--s3); color: #fff; }
.nav-btn.active { background: var(--orange); color: #000; font-weight: 700; }

.main { margin-left: 220px; flex: 1; padding: 30px; }

/* --- COMPONENTI --- */
.page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
.page-title { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; }
.page-title small { font-size: 12px; color: var(--orange); display: block; font-family: 'DM Mono', monospace; }

.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
.stat { background: var(--s1); border: 1px solid var(--border); padding: 20px; border-radius: 12px; border-top: 3px solid var(--orange); }
.stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-family: 'DM Mono'; }
.stat-value { font-size: 28px; font-weight: 800; font-family: 'Syne'; margin-top: 5px; }

.card { background: var(--s1); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.card-head { padding: 15px 20px; background: var(--s2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }

table { width: 100%; border-collapse: collapse; }
th { text-align: left; padding: 12px 15px; font-size: 11px; color: var(--orange); font-family: 'DM Mono'; border-bottom: 1px solid var(--border); }
td { padding: 12px 15px; font-size: 13px; border-bottom: 1px solid #1a1a1a; color: #fff; }
tr:hover td { background: var(--s2); }

/* --- PULSANTI E INPUT --- */
.btn { padding: 10px 18px; border-radius: 7px; border: none; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.2s; }
.btn-primary { background: var(--orange); color: #000; }
.btn-ghost { background: transparent; color: #fff; border: 1px solid var(--border); }
.btn-danger { background: var(--red); color: #fff; }

.input { background: var(--s2); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; width: 100%; outline: none; }
.input:focus { border-color: var(--orange); }

/* --- MODALI --- */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.modal { background: var(--s1); border: 1px solid var(--orange); border-radius: 15px; width: 550px; max-width: 95%; max-height: 90vh; overflow-y: auto; }
.modal-head { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.modal-body { padding: 20px; }

.badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
.badge-y { background: #332200; color: var(--amber); border: 1px solid var(--amber); }
.badge-g { background: #002211; color: var(--green); border: 1px solid var(--green); }

/* --- CANVAS SCHEMA --- */
#schema-canvas { background: #111; border: 1px solid #333; border-radius: 10px; display: block; margin: 0 auto; cursor: crosshair; }

@media print { body * { visibility: hidden; } #parea, #parea * { visibility: visible; } #parea { position: absolute; left: 0; top: 0; width: 100%; } }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="logo-box">
      <div class="logo-icon">🔧</div>
      <div class="logo-name">REPAIR<span>PRO</span></div>
    </div>
    <nav class="nav">
      <button class="nav-btn active" onclick="goTo('dashboard',this)">📊 Dashboard</button>
      <button class="nav-btn" onclick="goTo('riparazioni',this)">🔧 Riparazioni</button>
      <button class="nav-btn" onclick="goTo('magazzino',this)">📦 Magazzino</button>
      <button class="nav-btn" onclick="goTo('fatture',this)">🧾 Fatture</button>
      <button class="nav-btn" onclick="goTo('impostazioni',this)">⚙️ Impostazioni</button>
    </nav>
  </aside>

  <main class="main">
    <section id="s-dashboard" class="section active">
      <div class="page-header">
        <div class="page-title">DASHBOARD <small>Panoramica Negozio</small></div>
        <button class="btn btn-primary" onclick="openM('m-rip')">+ NUOVA RIPARAZIONE</button>
      </div>
      <div class="stats" id="dash-stats"></div>
      <div class="card">
        <div class="card-head"><div class="card-title">ULTIME RIPARAZIONI</div></div>
        <table>
          <thead><tr><th>ID</th><th>CLIENTE</th><th>DISPOSITIVO</th><th>STATO</th><th>DATA</th></tr></thead>
          <tbody id="dash-tb"></tbody>
        </table>
      </div>
    </section>

    <section id="s-riparazioni" class="section" style="display:none">
      <div class="page-header">
        <div class="page-title">RIPARAZIONI <small>Gestione schede</small></div>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>CLIENTE</th><th>DISPOSITIVO</th><th>COSTO</th><th>STATO</th><th>AZIONI</th></tr></thead>
          <tbody id="rip-tb"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<div class="overlay" id="m-rip">
  <div class="modal">
    <div class="modal-head"><h3>NUOVA RIPARAZIONE</h3><button class="btn btn-ghost" onclick="closeM('m-rip')">X</button></div>
    <div class="modal-body">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
        <input class="input" id="r-nome" placeholder="Nome Cliente">
        <input class="input" id="r-tel" placeholder="Telefono">
      </div>
      <input class="input" id="r-dev" placeholder="Dispositivo (es. iPhone 13)" style="margin-bottom:15px;">
      <textarea class="input" id="r-prob" placeholder="Descrizione del problema" style="margin-bottom:15px; height:80px;"></textarea>
      
      <div style="text-align:center; margin-bottom:15px;">
        <label style="font-size:11px; color:var(--orange); display:block; margin-bottom:5px;">SCHEMA SBLOCCO</label>
        <canvas id="schema-canvas" width="180" height="180"></canvas>
        <button class="btn btn-ghost btn-sm" style="margin-top:5px;" onclick="clearSchema()">Cancella Schema</button>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
        <input class="input" type="number" id="r-costo" placeholder="Costo €">
        <select class="input" id="r-stato">
          <option>In attesa</option>
          <option>In lavorazione</option>
          <option>Pronto</option>
        </select>
      </div>
      <button class="btn btn-primary" style="width:100%; margin-top:20px;" onclick="saveRip()">SALVA SCHEDA</button>
    </div>
  </div>
</div>

<script>
// --- LOGICA DATABASE ---
let rips = JSON.parse(localStorage.getItem('rip_db') || '[]');
let ripId = parseInt(localStorage.getItem('rip_id') || '100');

function saveData() {
    localStorage.setItem('rip_db', JSON.stringify(rips));
    localStorage.setItem('rip_id', ripId.toString());
}

function goTo(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('s-' + id).style.display = 'block';
    if(btn) btn.classList.add('active');
    if(id === 'dashboard') renderDash();
    if(id === 'riparazioni') renderRip();
}

function openM(id) { 
    document.getElementById(id).classList.add('open'); 
    if(id === 'm-rip') initCanvas();
}
function closeM(id) { document.getElementById(id).classList.remove('open'); }

function renderDash() {
    const tb = document.getElementById('dash-tb');
    const st = document.getElementById('dash-stats');
    
    st.innerHTML = `
        <div class="stat"><div class="stat-label">Totali</div><div class="stat-value">${rips.length}</div></div>
        <div class="stat"><div class="stat-label">In Corso</div><div class="stat-value">${rips.filter(r => r.stato !== 'Pronto').length}</div></div>
        <div class="stat" style="border-color:var(--green)"><div class="stat-label">Pronti</div><div class="stat-value">${rips.filter(r => r.stato === 'Pronto').length}</div></div>
        <div class="stat"><div class="stat-label">Oggi</div><div class="stat-value">${new Date().getDate()}</div></div>
    `;

    tb.innerHTML = rips.slice(0, 5).map(r => `
        <tr>
            <td style="color:var(--orange)">#${r.id}</td>
            <td><b>${r.nome}</b></td>
            <td>${r.dev}</td>
            <td><span class="badge ${r.stato === 'Pronto' ? 'badge-g' : 'badge-y'}">${r.stato}</span></td>
            <td style="color:var(--muted)">${r.data}</td>
        </tr>
    `).join('');
}

function renderRip() {
    const tb = document.getElementById('rip-tb');
    tb.innerHTML = rips.map(r => `
        <tr>
            <td>#${r.id}</td>
            <td>${r.nome}</td>
            <td>${r.dev}</td>
            <td style="color:var(--orange)">€${r.costo}</td>
            <td><span class="badge ${r.stato === 'Pronto' ? 'badge-g' : 'badge-y'}">${r.stato}</span></td>
            <td><button class="btn btn-danger btn-sm" onclick="delRip(${r.id})">ELIMINA</button></td>
        </tr>
    `).join('');
}

function saveRip() {
    const nome = document.getElementById('r-nome').value;
    const dev = document.getElementById('r-dev').value;
    if(!nome || !dev) return alert("Inserisci Nome e Dispositivo!");

    ripId++;
    const r = {
        id: ripId,
        nome: nome,
        tel: document.getElementById('r-tel').value,
        dev: dev,
        prob: document.getElementById('r-prob').value,
        costo: document.getElementById('r-costo').value || '0',
        stato: document.getElementById('r-stato').value,
        data: new Date().toLocaleDateString('it-IT')
    };

    rips.unshift(r);
    saveData();
    closeM('m-rip');
    renderDash();
    renderRip();
}

function delRip(id) {
    if(!confirm("Eliminare?")) return;
    rips = rips.filter(r => r.id !== id);
    saveData();
    renderRip();
    renderDash();
}

// --- CANVAS LOCK PATTERN ---
let canvas, ctx, points = [], drawing = false;

function initCanvas() {
    canvas = document.getElementById('schema-canvas');
    ctx = canvas.getContext('2d');
    drawGrid();
    
    canvas.onmousedown = (e) => { drawing = true; points = []; };
    canvas.onmousemove = (e) => { if(!drawing) return; handleMove(e); };
    window.onmouseup = () => { drawing = false; };
}

function drawGrid() {
    ctx.clearRect(0, 0, 180, 180);
    ctx.fillStyle = "#333";
    for(let x=0; x<3; x++) {
        for(let y=0; y<3; y++) {
            ctx.beginPath();
            ctx.arc(30 + x*60, 30 + y*60, 5, 0, Math.PI*2);
            ctx.fill();
        }
    }
}

function handleMove(e) {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    ctx.strokeStyle = "#ff5500";
    ctx.lineWidth = 4;
    ctx.lineTo(x, y);
    ctx.stroke();
}

function clearSchema() {
    points = [];
    drawGrid();
}

// Avvio
renderDash();
</script>

</body>
</html>
